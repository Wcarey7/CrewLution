<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}CrewLution{% endblock %}</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'marketing/css/marketing.css' %}">
        {% block extra_css %}{% endblock %}
    </head>
    <body class="marketing-body">
        <header class="marketing-header">
            <div class="container marketing-header__inner">
                <a href="{% url 'marketing:home' %}" class="marketing-logo">CrewLution</a>
                <nav class="marketing-nav">

                    <a href="{% url 'accounts:login' %}" class="btn btn-ghost">Log in</a>
                    <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Get started</a>
                </nav>
            </div>
        </header>
        <main class="marketing-main">
            {% if messages %}
            <div class="container messages">
                {% for message in messages %}
                <p class="message message-{{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
        <footer class="marketing-footer">
            <div class="container">
                <p>&copy; {% now "Y" %} CrewLution. All rights reserved.</p>
            </div>
        </footer>
        {% block extra_js %}{% endblock %}
    </body>

</html>
